<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hipobuy - Shipping Weight Estimator</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>Hipobuy</h1>
                <svg class="hippo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                    <path fill="currentColor" d="M424.6 200.5c-13.6-18.2-31.5-32.9-51.9-42.5-16.7-7.9-35.1-12.6-54.2-13.8-1.5-.1-3-.1-4.5-.1h-116c-1.5 0-3 0-4.5.1-19.1 1.2-37.5 5.9-54.2 13.8-20.4 9.6-38.3 24.3-51.9 42.5-15.6 20.8-25.7 45.4-29.3 71.5-1.1 8-1.7 16.2-1.7 24.5v35.5c0 30.9 25.1 56 56 56h16v16c0 22.1 17.9 40 40 40h32c22.1 0 40-17.9 40-40v-16h112v16c0 22.1 17.9 40 40 40h32c22.1 0 40-17.9 40-40v-16h16c30.9 0 56-25.1 56-56v-35.5c0-8.3-.6-16.5-1.7-24.5-3.6-26.1-13.7-50.7-29.3-71.5zM168 288c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24zm176 0c-13.3 0-24-10.7-24-24s10.7-24 24-24 24 10.7 24 24-10.7 24-24 24z"/>
                </svg>
            </div>
            <h2>Shipping Weight Estimator</h2>
        </header>

        <main>
            <div class="items-section" id="categories-container">
                <!-- Categories and items will be injected here by JS -->
            </div>

            <div class="sidebar">
                <div class="card other-items-card">
                    <h3 class="card-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #3b82f6; margin-right: 8px; vertical-align: text-bottom;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Other Items
                    </h3>
                    <p class="text-sm text-muted">Add custom weight for items not listed above.</p>
                    <div class="other-buttons">
                        <button id="add-50g" class="outline-btn">+ 50g</button>
                        <button id="add-100g" class="outline-btn">+ 100g</button>
                    </div>
                    <div id="other-weight-display" class="other-weight-display" style="display: none;">
                        <span class="text-sm text-muted">Added:</span>
                        <div class="other-weight-val-container">
                            <span id="other-weight-val" class="font-medium">0.00 kg</span>
                            <button id="clear-other" class="icon-btn" title="Clear other weight">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card summary-card">
                    <div class="summary-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"></path><path d="M7 21h10"></path><path d="M12 3v18"></path><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"></path></svg>
                        <h3>Total Estimated Weight</h3>
                    </div>
                    <div class="total-weight-display">
                        <span id="total-weight" class="total-number">0.00</span>
                        <span class="total-unit">kg</span>
                    </div>
                </div>

                <div class="tips-card">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 2px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    <p>Weights are estimated. Final shipping cost is based on warehouse packaging (usually lower).</p>
                </div>

                <button id="clear-btn" class="secondary-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    Clear All
                </button>
            </div>
        </main>
    </div>
    <script src="./script.js"></script>
</body>
</html>
